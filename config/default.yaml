# IR-to-RGB Satellite Interpretation — default config

project:
  name: "ir-rgb-fusion"
  seed: 42
  device: "cuda"  # auto-fallback to cpu in code

data:
  root: "data"
  rgb_dir: "data/rgb"
  ir_dir: "data/ir"
  image_size: 256
  train_split: 0.8
  val_split: 0.1
  # Synthetic IR degradation (Phase 0 fallback)
  synthetic:
    enabled: true
    contrast: 1.4
    brightness: -0.05
    noise_std: 0.03
    blur_kernel: 3
  # Registration misalignment for ablation (Phase 2)
  misalignment:
    max_shift_px: 8
    max_rotation_deg: 3
    prob: 0.5

model:
  generator:
    in_channels: 1
    out_channels: 3
    base_filters: 64
    dropout: 0.1  # used for MC Dropout at inference (Phase 5)
  discriminator:
    in_channels: 4  # IR + RGB concat for pix2pix
    base_filters: 64

training:
  batch_size: 4
  num_workers: 0  # use 2 on Linux/Mac; 0 avoids Windows multiprocessing issues
  epochs: 50
  lr_g: 0.0002
  lr_d: 0.0002
  beta1: 0.5
  beta2: 0.999
  lambda_l1: 100.0
  lambda_perceptual: 10.0
  save_every: 5
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  use_registration: false

registration:
  method: "orb"  # orb | sift
  max_features: 500
  ransac_threshold: 5.0

multitask:
  enabled: false
  lambda_det: 1.0
  num_classes: 80

self_supervised:
  enabled: false
  mask_ratio: 0.4
  pretrain_epochs: 30
  paired_fraction: 0.2

uncertainty:
  mc_samples: 20

eval:
  metrics: ["psnr", "ssim", "lpips"]
  output_dir: "results"

demo:
  port: 7860
